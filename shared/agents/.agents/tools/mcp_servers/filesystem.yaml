# MCP Server: Filesystem
# Documentación: https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem
#
# Permite a los agentes leer y escribir archivos dentro de las rutas permitidas.
# Fuera de esas rutas, el servidor rechaza las operaciones.
#
# Prerrequisitos:
#   - Node.js >= 18
#   - Las carpetas listadas en allowed_paths deben existir

server:
  name: filesystem
  description: "Lectura y escritura de archivos en rutas autorizadas"
  transport: stdio
  command: npx
  args:
    - "-y"
    - "@modelcontextprotocol/server-filesystem"
    - "./output"                           # cada arg adicional = ruta permitida
    - "./data"
    - "./reports"
  env: {}                                  # no requiere claves

# Rutas permitidas (deben coincidir con los args de arriba)
allowed_paths:
  - "./output"     # archivos generados por los agentes
  - "./data"       # datos de entrada del proyecto
  - "./reports"    # informes finales

# Tools que expone este servidor
tools_provided:
  - name: read_file
    description: "Lee el contenido completo de un archivo"
    input_schema:
      type: object
      properties:
        path: { type: string, description: "Ruta relativa al archivo" }
      required: [path]

  - name: write_file
    description: "Escribe o sobreescribe un archivo con el contenido dado"
    input_schema:
      type: object
      properties:
        path:    { type: string, description: "Ruta de destino" }
        content: { type: string, description: "Contenido a escribir" }
      required: [path, content]

  - name: list_directory
    description: "Lista archivos y carpetas en un directorio"
    input_schema:
      type: object
      properties:
        path: { type: string, description: "Ruta del directorio" }
      required: [path]

  - name: create_directory
    description: "Crea un directorio (y los intermedios necesarios)"
    input_schema:
      type: object
      properties:
        path: { type: string }
      required: [path]

  - name: move_file
    description: "Mueve o renombra un archivo dentro de las rutas permitidas"
    input_schema:
      type: object
      properties:
        source:      { type: string }
        destination: { type: string }
      required: [source, destination]

  - name: search_files
    description: "Busca archivos por nombre o extensión en un directorio"
    input_schema:
      type: object
      properties:
        path:    { type: string }
        pattern: { type: string, description: "Glob pattern, e.g. '*.md'" }
      required: [path, pattern]

# Casos de uso típicos en este proyecto
usage_examples:
  - description: "El writer_agent guarda un informe generado"
    tool: write_file
    args: { path: "./reports/informe_2025.md", content: "# Informe..." }

  - description: "El research_agent lista los datos disponibles"
    tool: list_directory
    args: { path: "./data" }
